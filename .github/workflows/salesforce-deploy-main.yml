name: Salesforce Deploy Main

on:
  push:
    branches:
      - main
    paths:
      - 'force-app/**'
      - 'manifest/**'
      - 'sfdx-project.json'

permissions:
  contents: read

jobs:
  deploy-salesforce:
    name: deploy-salesforce
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate Dev Org
        run: |
          echo "${{ secrets.DEV_SFDX_AUTH_URL }}" > ./DEV_SFDX_AUTH_URL.txt
          sf org login sfdx-url \
            --sfdx-url-file ./DEV_SFDX_AUTH_URL.txt \
            --alias dev \
            --set-default

      - name: Deploy Salesforce Metadata
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org dev \
            --test-level NoTestRun \
            --wait 20 \
            --json
