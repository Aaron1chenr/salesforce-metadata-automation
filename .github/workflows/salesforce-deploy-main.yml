name: Salesforce Deploy Main


on:

  push:

    branches:

      - main


    paths:

      - 'force-app/**'

      - 'manifest/**'

      - 'sfdx-project.json'



permissions:

  contents: read



concurrency:

  group: salesforce-deploy-main

  cancel-in-progress: true



jobs:


  deploy-salesforce:


    name: deploy-salesforce


    runs-on: ubuntu-latest


    timeout-minutes: 30



    steps:


      # =====================================
      # Checkout
      # =====================================

      - name: Checkout source

        uses: actions/checkout@v4



      # =====================================
      # Install Salesforce CLI
      # =====================================

      - name: Install Salesforce CLI

        run: |

          npm install --global @salesforce/cli



      # =====================================
      # Authenticate Salesforce Org
      # =====================================

      - name: Authenticate Salesforce Org

        run: |

          printf '%s' \
          "${{ secrets.DEV_SFDX_AUTH_URL }}" \
          > DEV_SFDX_AUTH_URL.txt


          sf org login sfdx-url \
            --sfdx-url-file DEV_SFDX_AUTH_URL.txt \
            --alias dev \
            --set-default


          sf org display \
            --target-org dev



      # =====================================
      # Validate DX Project Structure
      # =====================================

      - name: Validate Salesforce Project

        run: |

          ls -la


          test -f sfdx-project.json


          test -f manifest/package.xml



      # =====================================
      # Deploy Metadata
      # =====================================

      - name: Deploy Salesforce Metadata

        id: deploy

        run: |

          sf project deploy start \
            --manifest manifest/package.xml \
            --target-org dev \
            --test-level NoTestRun \
            --wait 30 \
            --json \
            > deploy-result.json



          cat deploy-result.json



          JOB_ID=$(jq -r '.result.id' deploy-result.json)



          if [ "$JOB_ID" = "null" ]; then

            echo "Deployment Job ID not found"

            exit 1

          fi



          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV




      # =====================================
      # Deployment Report
      # =====================================

      - name: Deployment Report

        if: always()

        run: |

          sf project deploy report \
            --target-org dev \
            --job-id $JOB_ID \
            --json




      # =====================================
      # Generic Metadata Verification
      # =====================================

      - name: Verify Deployment Components

        if: success()

        run: |

          echo "Deployment completed successfully."

          echo "Checking deployed metadata status..."

          sf project deploy report \
            --target-org dev \
            --job-id $JOB_ID \
            --json
